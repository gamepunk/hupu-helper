<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hupu助手</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 360px;
        min-height: 300px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background: #fff;
        color: #333;
      }

      .container {
        padding: 14px 12px;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding-bottom: 12px;
        flex-shrink: 0;
        border-bottom: 1px solid #f0f0f0;
      }

      .header-logo {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        object-fit: cover;
        display: block;
        flex-shrink: 0;
      }

      .header-text {
        flex: 1;
      }

      .header-text h1 {
        font-size: 14px;
        font-weight: 700;
        color: #333;
      }

      .header-text p {
        font-size: 11px;
        color: #999;
        margin-top: 1px;
      }

      .header-count {
        font-size: 11px;
        color: #999;
        background: #f5f5f5;
        padding: 3px 8px;
        border-radius: 8px;
        flex-shrink: 0;
      }

      .saved-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
        align-content: start;
      }

      .saved-grid::-webkit-scrollbar {
        width: 3px;
      }
      .saved-grid::-webkit-scrollbar-track {
        background: transparent;
      }
      .saved-grid::-webkit-scrollbar-thumb {
        background: #ddd;
        border-radius: 2px;
      }

      .saved-item {
        position: relative;
        border-radius: 4px;
        overflow: hidden;
        cursor: default;
        background: #fafafa;
        aspect-ratio: 1;
        border: 1px solid #eee;
        transition: border-color 0.15s;
      }

      .saved-item:hover {
        border-color: #d0d0d0;
      }

      .saved-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .saved-item .del-btn {
        position: absolute;
        top: 3px;
        right: 3px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: none;
        background: rgba(0, 0, 0, 0.5);
        color: #fff;
        font-size: 10px;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        line-height: 1;
        padding: 0;
      }

      .saved-item:hover .del-btn {
        display: flex;
      }
      .saved-item .del-btn:hover {
        background: rgba(255, 59, 48, 0.8);
      }

      .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 50px 16px;
        color: #555;
        font-size: 13px;
      }

      .empty-state .big {
        font-size: 36px;
        margin-bottom: 10px;
        opacity: 0.5;
      }
      .empty-state .hint {
        color: #444;
        font-size: 12px;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img class="header-logo" src="icons/icon48.png" alt="Hupu" />
        <div class="header-text">
          <h1>虎扑助手</h1>
        </div>
        <span class="header-count" id="countBadge">0</span>
      </div>
      <div class="saved-grid" id="savedGrid"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
